name: Daily Data Refresh

on:
  schedule:
    # Run daily at 2 AM UTC. Scheduled runs refresh one rolling shard of generated countries.
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      country_code:
        description: 'Optional single osu! country code to refresh'
        required: false
        default: ''
        type: string
      shard_count:
        description: 'Rolling shard count for scheduled/generated-country refreshes'
        required: false
        default: '14'
        type: string

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  daily-refresh:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Daily incremental data fetch
      env:
        OSU_API_KEY: ${{ secrets.OSU_API_KEY }}
        FORCE_REFRESH: 'false'
        COUNTRY_CODE: ${{ github.event.inputs.country_code || '' }}
        SHARD_COUNT: ${{ github.event.inputs.shard_count || '14' }}
      run: |
        npm run init-countries
        if [ -n "$COUNTRY_CODE" ]; then
          node scripts/fetch-country-batch.js --countries="$COUNTRY_CODE" --continue-on-error=false
        else
          SHARD_INDEX=$((10#$(date -u +%j) % SHARD_COUNT))
          node scripts/fetch-all-countries.js --only-existing --shard-count="$SHARD_COUNT" --shard-index="$SHARD_INDEX" --continue-on-error=true --max-discovery-requests=20
        fi
        npm run init-countries

    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/data/*.json
        git add data/*.json
        git commit -m "Daily country mapper refresh"

        # Concurrent workflow pushes often leave main ahead of this job.
        # Rebase onto latest remote and retry instead of failing on non-FF.
        BRANCH="${GITHUB_REF_NAME:-main}"
        for attempt in 1 2 3 4 5; do
          git fetch origin "$BRANCH"
          if git pull --rebase origin "$BRANCH" && git push origin "HEAD:$BRANCH"; then
            echo "Pushed successfully on attempt $attempt"
            exit 0
          fi
          echo "Push attempt $attempt failed; retrying..."
          sleep $((attempt * 5))
        done
        echo "Failed to push after retries"
        exit 1

    - name: Build and deploy site
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: npm run export

    - name: Deploy to GitHub Pages
      if: steps.verify-changed-files.outputs.changed == 'true'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        force_orphan: true

    - name: Create summary
      run: |
        if [ "${{ steps.verify-changed-files.outputs.changed }}" = "true" ]; then
          echo "Daily refresh completed with data changes." >> $GITHUB_STEP_SUMMARY
        else
          echo "Daily refresh completed with no data changes." >> $GITHUB_STEP_SUMMARY
        fi
