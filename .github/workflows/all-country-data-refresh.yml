name: All-Country Data Refresh

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Refresh mode'
        required: true
        default: 'missing'
        type: choice
        options:
          - missing
          - all
          - selected
      countries:
        description: 'Comma-separated country codes when mode=selected'
        required: false
        default: ''
        type: string
      shard_count:
        description: 'Number of country shards'
        required: false
        default: '24'
        type: string
      continue_on_error:
        description: 'Continue fetching other countries after a country fails'
        required: false
        default: 'true'
        type: boolean
      max_discovery_requests:
        description: 'Maximum shared discovery requests against get_beatmaps'
        required: false
        default: '2000'
        type: string
      since:
        description: 'Discovery start date for first-pass indexing'
        required: false
        default: '2007-01-01'
        type: string

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.shards.outputs.shards }}
      shard_count: ${{ steps.shards.outputs.shard_count }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Initialize country list
      run: npm run init-countries

    - name: Discover mapper countries
      env:
        OSU_API_KEY: ${{ secrets.OSU_API_KEY }}
        MAX_DISCOVERY_REQUESTS: ${{ github.event.inputs.max_discovery_requests || '2000' }}
        SINCE_DATE: ${{ github.event.inputs.since || '2007-01-01' }}
      run: |
        node scripts/fetch-all-countries.js \
          --discover-only \
          --discovery-file=data/country-discovery.json \
          --since="$SINCE_DATE" \
          --max-discovery-requests="$MAX_DISCOVERY_REQUESTS"

    - name: Upload discovery data
      uses: actions/upload-artifact@v6
      with:
        name: country-discovery
        path: data/country-discovery.json
        retention-days: 3

    - name: Build shard matrix
      id: shards
      env:
        SHARD_COUNT: ${{ github.event.inputs.shard_count || '24' }}
      run: |
        node - <<'NODE'
        const count = Math.max(1, parseInt(process.env.SHARD_COUNT || '24', 10));
        const shards = Array.from({ length: count }, (_, index) => index);
        const fs = require('fs');
        fs.appendFileSync(process.env.GITHUB_OUTPUT, `shards=${JSON.stringify(shards)}\n`);
        fs.appendFileSync(process.env.GITHUB_OUTPUT, `shard_count=${count}\n`);
        NODE

  fetch:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.shards) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Initialize country list
      run: npm run init-countries

    - name: Download discovery data
      uses: actions/download-artifact@v7
      with:
        name: country-discovery
        path: data

    - name: Fetch country shard
      env:
        OSU_API_KEY: ${{ secrets.OSU_API_KEY }}
        MODE: ${{ github.event.inputs.mode || 'missing' }}
        COUNTRIES: ${{ github.event.inputs.countries || '' }}
        SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
        SHARD_INDEX: ${{ matrix.shard }}
        CONTINUE_ON_ERROR: ${{ github.event.inputs.continue_on_error || 'true' }}
      run: |
        ARGS="--discovery-file=data/country-discovery.json --shard-count=$SHARD_COUNT --shard-index=$SHARD_INDEX --continue-on-error=$CONTINUE_ON_ERROR"
        if [ "$MODE" = "missing" ]; then
          ARGS="$ARGS --only-missing --write-empty"
        fi
        if [ "$MODE" = "all" ]; then
          ARGS="$ARGS --write-empty"
        fi
        if [ "$MODE" = "selected" ]; then
          ARGS="$ARGS --countries=$COUNTRIES"
        fi
        node scripts/fetch-all-countries.js $ARGS
        npm run init-countries

    - name: Collect shard data
      run: |
        rm -rf shard-output
        mkdir -p shard-output
        touch shard-output/.keep

        git status --porcelain -- public/data data | while IFS= read -r line; do
          file="${line:3}"
          case "$file" in
            public/data/mappers-*.json|data/fetch-state-*.json|data/creator-mappings-*.json)
              mkdir -p "shard-output/$(dirname "$file")"
              cp "$file" "shard-output/$file"
              ;;
          esac
        done

        echo "Shard artifact contents:"
        find shard-output -type f -print | sort

    - name: Validate shard JSON
      run: |
        node - <<'NODE'
        const fs = require('fs');
        const path = require('path');

        function walk(dir) {
          if (!fs.existsSync(dir)) return [];
          return fs.readdirSync(dir, { withFileTypes: true }).flatMap(entry => {
            const fullPath = path.join(dir, entry.name);
            return entry.isDirectory() ? walk(fullPath) : [fullPath];
          });
        }

        for (const file of walk('shard-output').filter(file => file.endsWith('.json'))) {
          try {
            JSON.parse(fs.readFileSync(file, 'utf8'));
          } catch (error) {
            throw new Error(`Invalid JSON in ${file}: ${error.message}`);
          }
        }
        NODE

    - name: Upload shard data
      uses: actions/upload-artifact@v6
      with:
        name: country-data-shard-${{ matrix.shard }}
        path: shard-output/
        include-hidden-files: true
        if-no-files-found: ignore
        retention-days: 3

  merge:
    needs: fetch
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Download shard data
      uses: actions/download-artifact@v7
      with:
        pattern: country-data-shard-*
        merge-multiple: true

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Validate merged JSON
      run: |
        node - <<'NODE'
        const fs = require('fs');
        const path = require('path');

        function walk(dir) {
          if (!fs.existsSync(dir)) return [];
          return fs.readdirSync(dir, { withFileTypes: true }).flatMap(entry => {
            const fullPath = path.join(dir, entry.name);
            return entry.isDirectory() ? walk(fullPath) : [fullPath];
          });
        }

        for (const dir of ['public/data', 'data']) {
          for (const file of walk(dir).filter(file => file.endsWith('.json'))) {
            try {
              JSON.parse(fs.readFileSync(file, 'utf8'));
            } catch (error) {
              throw new Error(`Invalid JSON in ${file}: ${error.message}`);
            }
          }
        }
        NODE

    - name: Refresh public country metadata
      run: npm run init-countries

    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/data/*.json
        git add data/*.json
        git commit -m "Refresh country mapper data"

        # Concurrent workflow pushes often leave main ahead of this job.
        # Rebase onto latest remote and retry instead of failing on non-FF.
        BRANCH="${GITHUB_REF_NAME:-main}"
        for attempt in 1 2 3 4 5; do
          git fetch origin "$BRANCH"
          if git pull --rebase origin "$BRANCH" && git push origin "HEAD:$BRANCH"; then
            echo "Pushed successfully on attempt $attempt"
            exit 0
          fi
          echo "Push attempt $attempt failed; retrying..."
          sleep $((attempt * 5))
        done
        echo "Failed to push after retries"
        exit 1

    - name: Build site
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: npm run export

    - name: Deploy to GitHub Pages
      if: steps.verify-changed-files.outputs.changed == 'true'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        force_orphan: true
