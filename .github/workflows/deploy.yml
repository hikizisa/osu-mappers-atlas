name: Deploy osu! Mappers Atlas

on:
  workflow_dispatch:
    inputs:
      country_code:
        description: 'Optional osu! country code to refresh before deploy'
        required: false
        default: ''
        type: string
  schedule:
    # Run monthly on the 1st at 2 AM UTC to refresh data
    - cron: '0 2 1 * *'
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Refresh requested country data
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.country_code != ''
      env:
        OSU_API_KEY: ${{ secrets.OSU_API_KEY }}
        MAPPER_COUNTRY: ${{ github.event.inputs.country_code }}
      run: |
        npm run init-countries
        npm run fetch-data
        npm run init-countries

    - name: Initialize country metadata
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.country_code == ''
      run: npm run init-countries

    - name: Build site
      run: npm run export

    - name: Verify data exists in output
      run: |
        if [ -f "./out/data/countries.json" ] && ls ./out/data/mappers-*.json >/dev/null 2>&1; then
          echo "Data files found in output directory"
          echo "Countries file size: $(du -h ./out/data/countries.json | cut -f1)"
        else
          echo "Warning: generated data files not found in output directory"
          echo "Contents of ./out/data/:"
          ls -la ./out/data/ || echo "./out/data/ directory does not exist"
        fi

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        force_orphan: true
